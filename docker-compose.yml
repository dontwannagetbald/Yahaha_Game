services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yahaha_game}
      POSTGRES_USER: ${POSTGRES_USER:-yahaha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-change-me-local}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-me-local}
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    entrypoint: ["sh", "/minio-init.sh"]
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-change-me-local}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me-local}
      MINIO_BUCKET: ${MINIO_BUCKET:-yahaha-game}
    volumes:
      - ./deployment/minio-init.sh:/minio-init.sh:ro
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://yahaha:change-me-local@db:5432/yahaha_game}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-change-me-local}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me-local}
      MINIO_BUCKET: ${MINIO_BUCKET:-yahaha-game}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-local-session-secret}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/auth/oauth/google/callback}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8000/api/auth/oauth/github/callback}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-mock}
      AGENT_RUNNER: ${AGENT_RUNNER:-langgraph}
      MOCK_PROVIDER_ENABLED: ${MOCK_PROVIDER_ENABLED:-true}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-https://api.example.com/v1}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-example-model}
      OPENAI_COMPATIBLE_TIMEOUT_SECONDS: ${OPENAI_COMPATIBLE_TIMEOUT_SECONDS:-120}
      LLM_PROVIDER: ${LLM_PROVIDER:-${MODEL_PROVIDER:-mock}}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-yahaha-game}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LAN_AGENTS_SRC_PATH: ${LAN_AGENTS_SRC_PATH:-/app/lan_agents/src}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  frontend:
    profiles: ["docker-frontend"]
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
  minio-data:
